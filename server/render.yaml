services:
  - type: web
    name: tradeflow-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DB_PATH
        value: /app/data/tradeflow.db
    disk:
      name: tradeflow-data
      mountPath: /app/data
      sizeGB: 1
